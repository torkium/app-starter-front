services:
  frontend-dev:
    profiles:
      - dev
    build:
      context: .
      target: dev
    command: npm run dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

  frontend:
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/runtime-config.js"]
      interval: 10s
      timeout: 5s
      retries: 6

  tooling:
    build:
      context: .
      target: tooling
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

  storybook:
    profiles:
      - storybook
    build:
      context: .
      target: deps
    command: npm run storybook
    env_file:
      - .env
    ports:
      - "6006:6006"
    volumes:
      - .:/app
      - /app/node_modules
